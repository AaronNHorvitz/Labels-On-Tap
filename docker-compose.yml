services:
  app:
    build: .
    environment:
      - APP_ENV=production
      - DATA_DIR=/app/data
      - OCR_CONFIDENCE_THRESHOLD=0.70
    volumes:
      - ./data/jobs:/app/data/jobs
    restart: unless-stopped

  caddy:
    image: caddy:2
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
