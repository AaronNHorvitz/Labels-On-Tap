services:
  app:
    build: .
    environment:
      - DATA_DIR=/app/data
      - OCR_CONFIDENCE_THRESHOLD=0.70
      - FIELD_SUPPORT_MODEL_ENABLED=true
      - FIELD_SUPPORT_MODEL_DIR=/app/models/field_support/distilroberta
      - FIELD_SUPPORT_THRESHOLD=0.53
    volumes:
      - ./data/jobs:/app/data/jobs
      - ./data/work/demo-upload:/app/data/work/demo-upload:ro
      - ./data/work/field-support-models/distilroberta-field-support-v1-runtime/model:/app/models/field_support/distilroberta:ro
    restart: unless-stopped

  caddy:
    image: caddy:2
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
